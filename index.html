<!DOCTYPE html>
<html lang="en">

<head><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css">

  <meta charset="UTF-8">

  <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0"
  >

  <title>Road Wallet</title>


  <link 
    rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
  >


  <link 
    rel="stylesheet" 
    href="https://fonts.googleapis.com/css?family=Inter:400,500,600,700&display=swap"
  >


  <link rel="stylesheet" href="styles.css">

</head>



<body>


<div class="container">


  <h1>
    <i class="fas fa-route"></i>
    Road Wallet
  </h1>



  <h2 class="heading-total">

    Total Expenses:

    <span id="total-expenses-amount">
      $0.00
    </span>

  </h2>





  <!-- Manage Travelers Button -->


  <button id="open-modal-button">

    <i class="fas fa-users"></i>

    Manage Travelers

  </button>







  <!-- Traveler Modal -->


  <div id="travelers-modal" class="modal">


    <div class="modal-content">


      <span class="close-button">
        &times;
      </span>



      <form id="travelers-form">


        <h2>
          Add Traveler
        </h2>


        <label for="traveler-name">

          Traveler Name:

        </label>


        <input

          type="text"

          id="traveler-name"

          placeholder="Enter name"

          required

        >



        <button type="submit">

          <i class="fas fa-user-plus"></i>

          Add Traveler

        </button>



      </form>



      <h3>
        Traveler Balances
      </h3>


      <div id="travelers-list">

      </div>


    </div>


  </div>






  <hr>






  <!-- Add Expense -->


  <form id="expense-form">


    <h2>
      Add Expense
    </h2>



    <label for="expense-category">

      Category:

    </label>


    <select id="expense-category">


      <option value="food">
        Food
      </option>


      <option value="gas">
        Gas
      </option>


      <option value="accommodations">
        Accommodations
      </option>


      <option value="sightseeing">
        Sightseeing
      </option>


      <option value="other">
        Other
      </option>


    </select>





    <label for="expense-amount">

      Amount:

    </label>



    <input

      type="number"

      id="expense-amount"

      step="0.01"

      min="0"

      placeholder="0.00"

      required

    >





    <label for="expense-payer">

      Paid By:

    </label>



    <select id="expense-payer" required>


      <option value="">

        Select traveler

      </option>


    </select>





    <button type="submit">


      <i class="fas fa-plus"></i>


      Add Expense


    </button>



  </form>







  <hr>







  <!-- Expense History -->


  <h2>
    Expense History
  </h2>


  <ul id="expense-list">

  </ul>








  <hr>







  <!-- Expense Summary Table -->


  <h2>

    Expense Summary

  </h2>



  <div class="summary-table-container">


    <table id="expense-summary">


      <thead>


        <tr>


          <th>
            Traveler
          </th>


          <th>
            Paid
          </th>


          <th>
            Share
          </th>


          <th>
            Net
          </th>


        </tr>


      </thead>



      <tbody id="summary-body">


      </tbody>



    </table>


  </div>








  <hr>







  <!-- Settlement Plan -->


  <h2>

    Settlement Plan

  </h2>



  <div id="settlement-list">


    <p>
      Add expenses to calculate settlements.
    </p>


  </div>





</div>






<script 
  type="module" 
  src="index.js">
</script>


</body>


</html>
